<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <title>Login Page</title>
    <link rel="icon" href="./images/favicon/avengers-1.svg">

    <!-- tailwind & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
   <link rel="stylesheet" href="./style/style.css">


</head>
<body class="bg-[#f8fafc]">
    <header>
        <div class="navbar bg-base-100 shadow-sm flex justify-between px-8 py-4 md:px-20 py-4">
  <div class="flex gap-1 items-center">
    <img class="max-w-[37px]" src="./images/github-logo.png" alt="">
    <p class="text-[14px] md:text-[24px] font-semibold text-[#1F2937]">GitHub Issues Tracker</p>
  </div>
  <div class="flex gap-2">
    <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
    <div class="dropdown dropdown-end">
      <div tabindex="0" role="button">
        <div>
            <button class="btn btn-primary flex items-center gap-2 text-[12px] md:text-[16px] font-semibold text-[#ffffff]"> <img class="w-2 h-2 md:w-4 h-4" src="./images/plus.png" alt="">New Issue</button>
        </div>
      </div>
      <ul
        tabindex="-1"
        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
        <li>
          <a class="justify-between">
            Profile
            <span class="badge">New</span>
          </a>
        </li>
        <li><a>Settings</a></li>
        <li><a>Logout</a></li>
      </ul>
    </div>
  </div>
</div>
    </header>

    <section class="mt-[60px] mb-[16px] px-[50px] sm:px-[80px] md:px-[120px] lg:px-[180px] xl:px-[245px]">
      <div class="flex gap-2 shadow-[0_1px_6px_0_rgba(0,0,0,0.08)] p-6 mx-auto">
        <button id="allBtn" class="btn flex items-center gap-2 text-[12px] md:text-[16px] font-semibold text-[#64748B]">All</button>
        <button id="openBtn" class="btn flex items-center gap-2 text-[12px] md:text-[16px] font-semibold text-[#64748B]">Open</button>
        <button id="closedBtn" class="btn flex items-center gap-2 text-[12px] md:text-[16px] font-semibold text-[#64748B]">Closed</button>
      </div>
    </section>

    <section class="px-[50px] sm:px-[80px] md:px-[120px] lg:px-[180px] xl:px-[245px]">
      <div class="p-6 shadow-[0_1px_6px_0_rgba(0,0,0,0.08)] flex items-center justify-between max-w-[1440px]">
          <div class="flex items-center gap-2">
              <div class="rounded-3xl bg-[#ece4ff] p-2">
                  <img src="./images/Aperture.png" alt="">
                </div>
                <div>
                  <p class="text-[20px] font-semibold text-[#1F2937]"><span id="issueCount">0</span> Issues</p>
                  <p class="text-[16px] font-normal text-[#64748B]">Track and manage your project issues</p>
              </div>
          </div>
        <div class="flex gap-4">
          <div class="flex gap-2">
              <img class="max-w-[12px]" src="./images/Ellipse 2.svg" alt="">
              <p>Open</p>
          </div>
          <div class="flex gap-2">
              <img class="max-w-[12px]" src="./images/Ellipse 2 (1).svg" alt="">
              <p>Closed</p>
          </div>
        </div>
      </div>
    </section>

    <section>
          <div class="px-[50px] sm:px-[80px] md:px-[120px] lg:px-[180px] xl:px-[245px]">
                    <div id="issueContainer" class="mt-4 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">

                    </div>
                </div>
    </section>

</body>
</html>
